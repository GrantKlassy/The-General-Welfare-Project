version: "3"

tasks:
  dev:
    desc: Start Astro dev server
    cmds:
      - pnpm dev

  check:
    desc: Run all standard repo checks
    cmds:
      - task: check:author
      - task: check:readme
      - task: check:license
      - task: check:history
      - task: check:format
      - task: check:types
      - task: check:i18n
      - task: check:translations
      - task: check:locale-links

  check:author:
    desc: Verify git identity is GrantKlassy
    cmds:
      - |
        NAME=$(git config user.name)
        if [ "$NAME" != "GrantKlassy" ]; then
          echo "ERROR: git user.name is '$NAME' — expected 'GrantKlassy'"
          exit 1
        fi
        echo "OK: git user.name is GrantKlassy"

  check:readme:
    desc: Verify README.md exists
    cmds:
      - |
        if [ ! -f README.md ]; then
          echo "ERROR: README.md missing"
          exit 1
        fi
        echo "OK: README.md exists"

  check:license:
    desc: Verify LICENSE.txt exists
    cmds:
      - |
        if [ ! -f LICENSE.txt ]; then
          echo "ERROR: LICENSE.txt missing"
          exit 1
        fi
        echo "OK: LICENSE.txt exists"

  check:format:
    desc: Check code formatting
    cmds:
      - pnpm run format:check

  check:types:
    desc: Run astro check (type checking)
    cmds:
      - pnpm run check

  check:history:
    desc: Verify no Co-Authored-By in git history
    cmds:
      - |
        COUNT=$(git log --all --grep="Co-Authored-By" --oneline | wc -l)
        if [ "$COUNT" -gt 0 ]; then
          echo "ERROR: $COUNT commits contain Co-Authored-By trailers"
          git log --all --grep="Co-Authored-By" --oneline
          exit 1
        fi
        echo "OK: no Co-Authored-By contamination"

  check:i18n:
    desc: Verify translations are not stale vs en.ts
    cmds:
      - bash scripts/check-translations-fresh.sh

  check:translations:
    desc: LLM quality review of changed translations (skips if none changed)
    cmds:
      - bash scripts/check-translations-quality.sh

  check:locale-links:
    desc: Verify no hardcoded internal links that lose language context
    cmds:
      - bash scripts/check-locale-links.sh

  test:
    desc: Run all Playwright tests (smoke + perf)
    cmds:
      - pnpm exec playwright test

  test:smoke:
    desc: Run smoke tests only
    cmds:
      - pnpm exec playwright test tests/smoke.spec.ts

  test:perf:
    desc: Run Playwright performance tests only
    cmds:
      - pnpm exec playwright test tests/perf.spec.ts --project=budget-android-360x800

  perf:
    desc: Run full performance suite (Playwright + Lighthouse)
    cmds:
      - task: perf:playwright
      - task: perf:lighthouse

  perf:playwright:
    desc: Playwright performance benchmarks
    cmds:
      - pnpm exec playwright test tests/perf.spec.ts --project=budget-android-360x800

  perf:lighthouse:
    desc: Lighthouse CI audits with budgets
    cmds:
      - pnpm exec lhci autorun

  translate:
    desc: Translate en.ts to target locale(s) using Claude
    vars:
      LOCALE: '{{.LOCALE | default "all"}}'
      MODEL: '{{.MODEL | default "sonnet"}}'
    cmds:
      - |
        if [ "{{.LOCALE}}" = "all" ]; then
          MODEL={{.MODEL}} bash scripts/translate.sh
        else
          MODEL={{.MODEL}} bash scripts/translate.sh {{.LOCALE}}
        fi

  translate:review:
    desc: Review translation quality using LLM-as-Judge
    vars:
      LOCALE: '{{.LOCALE | default "all"}}'
      MODEL: '{{.MODEL | default "sonnet"}}'
    cmds:
      - |
        if [ "{{.LOCALE}}" = "all" ]; then
          MODEL={{.MODEL}} bash scripts/review-translation.sh
        else
          MODEL={{.MODEL}} bash scripts/review-translation.sh {{.LOCALE}}
        fi
